[custom_commands]
"add selected to megamerge" = {args = ["rebase", "-r", "$change_id", "-A", "main", "-B", "megamerge"]}
"remove selected from megamerge" = {args = ["rebase", "-s", "megamerge", "-d", "megamerge- ~$change_id"]}
"rebase all" = {args = ["rebase", "-b", "megamerge", "-d", "main"]}
"new main" = {args = ["new", "main"]}
"resolve mergiraf" = {key = ["V"], args = ["resolve", "--tool", "mergiraf", "-r", "$change_id"]}
"fix" = {key = ["F"], args = ["fix"]}

[[actions]]
name = "megamerge.add"
lua = '''
jj_async("rebase", "-r", context.change_id(), "-A", "trunk()", "-B", "megamerge")
revisions.refresh()
'''

[[actions]]
name = "megamerge.remove"
lua = '''
jj_async("rebase", "-s", "megamerge", "-d", "megamerge- ~" .. context.change_id())
revisions.refresh()
'''

[[actions]]
name = "rebase-all"
lua = '''
jj_async("rebase", "-b", "megamerge", "-d", "trunk()")
revisions.refresh()
'''

[[actions]]
name = "new-main"
lua = '''
jj_async("new", "trunk()")
revisions.refresh()
'''

[[actions]]
name = "resolve-mergiraf"
lua = '''
jj_async("resolve", "--tool", "mergiraf", "-r", context.change_id())
revisions.refresh()
'''

[[actions]]
name = "fix"
lua = '''
jj_async("fix")
revisions.refresh()
'''

[[bindings]]
action = "resolve-mergiraf"
key = "V"
scope = "revisions"
desc = "resolve mergiraf"

[[bindings]]
action = "fix"
key = "F"
scope = "revisions"
desc = "fix"

[[bindings]]
action = "megamerge.add"
seq = ["x", "a"]
scope = "revisions"
desc = "add to megamerge"

[[bindings]]
action = "megamerge.remove"
seq = ["x", "d"]
scope = "revisions"
desc = "remove from megamerge"

[[bindings]]
action = "rebase-all"
seq = ["x", "r"]
scope = "revisions"
desc = "rebase all"